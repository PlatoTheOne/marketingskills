name: Deploy README Web Preview

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "README.html"
      - "openclaw-tailor-resume-guide.html"
      - "assets/**"
      - "favicon.ico"
      - "favicon-32x32.png"
      - "apple-touch-icon.png"
      - "CNAME"
      - "sync-readme-web.ps1"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare site
        run: |
          mkdir -p _site
          if [ -f index.html ]; then
            cp index.html _site/index.html
          else
            cp README.html _site/index.html
          fi
          cp README.html _site/README.html
          if [ -f openclaw-tailor-resume-guide.html ]; then
            cp openclaw-tailor-resume-guide.html _site/openclaw-tailor-resume-guide.html
          fi
          if [ -d assets ]; then
            cp -R assets _site/assets
          fi
          for file in favicon.ico favicon-32x32.png apple-touch-icon.png CNAME; do
            if [ -f "$file" ]; then
              cp "$file" "_site/$file"
            fi
          done
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
